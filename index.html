<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maths Solver Calculator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#eef1f7;display:flex;justify-content:center;align-items:center;min-height:100vh}
.calculator{width:480px;background:#fff;border-radius:20px;padding:20px;box-shadow:0 12px 30px rgba(0,0,0,.15)}
.title{font-size:24px;font-weight:600;margin-bottom:10px;color:#1a1a2e}
.display{width:100%;height:65px;border-radius:12px;border:1px solid #ddd;font-size:26px;text-align:right;padding:0 14px;margin-bottom:12px;outline:none;background:#fff;color:#1a1a2e;box-sizing:border-box}
.display::placeholder{color:#999}
.mode-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:14px;color:#666}
.mode-btn{height:32px;padding:0 14px;border:none;border-radius:8px;font-size:13px;cursor:pointer;background:#f1f3f8;color:#333;transition:.2s}
.mode-btn.active{background:#2962ff;color:#fff}
.tabs{display:flex;gap:20px;margin-bottom:12px;border-bottom:1px solid #ddd}
.tabs span{cursor:pointer;padding-bottom:6px;color:#666;font-size:14px;border-bottom:2px solid transparent;transition:.2s}
.tabs span.active{color:#2962ff;border-bottom-color:#2962ff}
.panel{display:none;grid-template-columns:repeat(6,1fr);gap:10px}
.panel.active{display:grid}
button{height:55px;border:none;border-radius:14px;background:#f1f3f8;font-size:17px;cursor:pointer;transition:.15s;color:#1a1a2e}
button:hover{background:#e1e6f5}
button:active{transform:scale(.95)}
.operator{background:#dfe5ff}
.operator:hover{background:#c8d2ff}
.equal{background:#2962ff;color:#fff;grid-column:span 2;font-weight:600}
.equal:hover{filter:brightness(1.08)}
.clear{background:#f0f0f0}
.clear:hover{background:#e0e0e0}
</style>
</head>
<body>

<div class="calculator">
<div class="title">Maths Solver</div>
<input id="display" class="display" placeholder="0" readonly>

<div class="mode-row">
Angle Mode:
<button class="mode-btn active" onclick="setMode('deg',this)">Deg</button>
<button class="mode-btn" onclick="setMode('rad',this)">Rad</button>
</div>

<div class="tabs" id="tabs">
<span class="active" onclick="openTab(0)">Algebra</span>
<span onclick="openTab(1)">Trigonometry</span>
<span onclick="openTab(2)">Calculus</span>
</div>

<!-- ALGEBRA -->
<div class="panel active" id="panel0">
<button onclick="ins('(')">(</button>
<button onclick="ins(')')">)</button>
<button onclick="cls()" class="clear">AC</button>
<button onclick="bk()">⌫</button>
<button onclick="ins('/')" class="operator">÷</button>
<button onclick="ins('*')" class="operator">×</button>

<button onclick="ins('7')">7</button>
<button onclick="ins('8')">8</button>
<button onclick="ins('9')">9</button>
<button onclick="ins('-')" class="operator">−</button>
<button onclick="doSqrt()">√</button>
<button onclick="doSquare()">x²</button>

<button onclick="ins('4')">4</button>
<button onclick="ins('5')">5</button>
<button onclick="ins('6')">6</button>
<button onclick="ins('+')" class="operator">+</button>
<button onclick="ins('**')">xʸ</button>
<button onclick="doLog()">log</button>

<button onclick="ins('1')">1</button>
<button onclick="ins('2')">2</button>
<button onclick="ins('3')">3</button>
<button onclick="ins('3.141592653589793')">π</button>
<button onclick="ins('2.718281828459045')">e</button>
<button onclick="calc()" class="equal">=</button>

<button onclick="ins('0')">0</button>
<button onclick="ins('.')">.</button>
</div>

<!-- TRIGONOMETRY -->
<div class="panel" id="panel1">
<button onclick="trig(Math.sin)">sin</button>
<button onclick="trig(Math.cos)">cos</button>
<button onclick="trig(Math.tan)">tan</button>
<button onclick="fn(Math.asin)">sin⁻¹</button>
<button onclick="fn(Math.acos)">cos⁻¹</button>
<button onclick="fn(Math.atan)">tan⁻¹</button>

<button onclick="trig(x=>1/Math.cos(x))">sec</button>
<button onclick="trig(x=>1/Math.sin(x))">csc</button>
<button onclick="trig(x=>1/Math.tan(x))">cot</button>
<button onclick="fn(Math.sinh)">sinh</button>
<button onclick="fn(Math.cosh)">cosh</button>
<button onclick="fn(Math.tanh)">tanh</button>

<button onclick="fn(Math.asinh)">sinh⁻¹</button>
<button onclick="fn(Math.acosh)">cosh⁻¹</button>
<button onclick="fn(Math.atanh)">tanh⁻¹</button>
<button onclick="ins('(')">(</button>
<button onclick="ins(')')">)</button>
<button onclick="bk()">⌫</button>

<button onclick="ins('7')">7</button>
<button onclick="ins('8')">8</button>
<button onclick="ins('9')">9</button>
<button onclick="ins('4')">4</button>
<button onclick="ins('5')">5</button>
<button onclick="ins('6')">6</button>

<button onclick="ins('1')">1</button>
<button onclick="ins('2')">2</button>
<button onclick="ins('3')">3</button>
<button onclick="ins('0')">0</button>
<button onclick="ins('.')">.</button>
<button onclick="cls()" class="clear">AC</button>

<button onclick="calc()" class="equal">=</button>
</div>

<!-- CALCULUS -->
<div class="panel" id="panel2">
<button onclick="derivative()">d/dx</button>
<button onclick="integral()">∫</button>
<button onclick="limitFn()">lim</button>
<button onclick="fn(Math.log)">ln</button>
<button onclick="fn(Math.exp)">eˣ</button>
<button onclick="fn(Math.cbrt)">∛</button>

<button onclick="doSquare()">x²</button>
<button onclick="ins('**')">xʸ</button>
<button onclick="doSqrt()">√</button>
<button onclick="fn(Math.abs)">|x|</button>
<button onclick="factorial()">x!</button>
<button onclick="doLog()">log</button>

<button onclick="ins('x')">x</button>
<button onclick="ins('(')">(</button>
<button onclick="ins(')')">)</button>
<button onclick="ins('3.141592653589793')">π</button>
<button onclick="ins('2.718281828459045')">e</button>
<button onclick="bk()">⌫</button>

<button onclick="ins('7')">7</button>
<button onclick="ins('8')">8</button>
<button onclick="ins('9')">9</button>
<button onclick="ins('4')">4</button>
<button onclick="ins('5')">5</button>
<button onclick="ins('6')">6</button>

<button onclick="ins('1')">1</button>
<button onclick="ins('2')">2</button>
<button onclick="ins('3')">3</button>
<button onclick="ins('0')">0</button>
<button onclick="ins('.')">.</button>
<button onclick="cls()" class="clear">AC</button>

<button onclick="calc()" class="equal">=</button>
</div>
</div>

<script>
const D=document.getElementById("display");
let mode="deg";

function ins(v){D.value+=v}
function cls(){D.value=""}
function bk(){D.value=D.value.slice(0,-1)}
function ev(){return Function('"use strict";return('+D.value+')')()}

function calc(){try{D.value=ev()}catch{D.value="Error"}}
function fn(f){try{D.value=f(ev())}catch{D.value="Error"}}
function convert(x){return mode==="deg"?x*Math.PI/180:x}
function trig(f){try{D.value=f(convert(ev()))}catch{D.value="Error"}}

function doSqrt(){fn(Math.sqrt)}
function doSquare(){fn(x=>x*x)}
function doLog(){fn(Math.log10)}

function factorial(){
  try{let n=Math.round(ev()),r=1;for(let i=2;i<=n;i++)r*=i;D.value=r}
  catch{D.value="Error"}
}

function derivative(){
  let expr=D.value,x=parseFloat(prompt("Value of x")),h=.0001;
  try{
    let f1=Function("x",'"use strict";return('+expr+')')(x);
    let f2=Function("x",'"use strict";return('+expr+')')(x+h);
    D.value=(f2-f1)/h
  }catch{D.value="Error"}
}

function integral(){
  let expr=D.value,a=parseFloat(prompt("Lower limit")),b=parseFloat(prompt("Upper limit"));
  let n=1000,h=(b-a)/n,sum=0;
  try{
    for(let i=0;i<n;i++){let x=a+i*h;sum+=Function("x",'"use strict";return('+expr+')')(x)}
    D.value=sum*h
  }catch{D.value="Error"}
}

function limitFn(){
  let expr=D.value,x=parseFloat(prompt("Limit x→ ?")),h=1e-6;
  try{D.value=Function("x",'"use strict";return('+expr+')')(x+h)}
  catch{D.value="Error"}
}

function setMode(m,btn){
  mode=m;
  document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active")
}

function openTab(i){
  document.querySelectorAll("#tabs span").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll("#tabs span")[i].classList.add("active");
  document.getElementById("panel"+i).classList.add("active")
}

// Keyboard support
document.addEventListener("keydown",e=>{
  if(e.key>="0"&&e.key<="9"){e.preventDefault();ins(e.key)}
  else if(e.key==="."){e.preventDefault();ins(".")}
  else if(e.key==="+"){e.preventDefault();ins("+")}
  else if(e.key==="-"){e.preventDefault();ins("-")}
  else if(e.key==="*"){e.preventDefault();ins("*")}
  else if(e.key==="/"){e.preventDefault();ins("/")}
  else if(e.key==="("){e.preventDefault();ins("(")}
  else if(e.key===")"){e.preventDefault();ins(")")}
  else if(e.key==="Enter"||e.key==="="){e.preventDefault();calc()}
  else if(e.key==="Escape"){e.preventDefault();cls()}
  else if(e.key==="Backspace"){e.preventDefault();bk()}
  else if(e.key==="^"){e.preventDefault();ins("**")}
})
</script>
</body>
</html>
